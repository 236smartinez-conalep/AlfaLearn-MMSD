<!doctype html>
<html lang="es" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AlfaLearn - CONALEP</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:
radial-gradient(circle at top,#1e3a8a,#0f172a 70%);
color:white;
position:relative;
}

/* ESTRELLAS */

body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:.15;
animation:stars 20s linear infinite;
pointer-events:none;
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(40px);
}
}

/* TITULO */

.pixel{
font-family:'Press Start 2P',cursive;
}

.glow{
color:#facc15;
text-shadow:
0 0 10px #facc15,
0 0 20px #facc15,
0 0 40px #f59e0b;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
text-shadow:
0 0 15px #facc15,
0 0 35px #facc15,
0 0 60px #f59e0b;
}
}

/* TARJETAS */

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.15);
border-radius:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

/* BOTONES */

.btn{
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

.btn-play{
background:
linear-gradient(
135deg,
#facc15,
#f59e0b
);
color:white;
font-size:1.4rem;
font-weight:bold;
border:none;
border-radius:20px;
padding:18px 40px;
box-shadow:
0 10px 30px rgba(250,204,21,.4);
cursor:pointer;
}

/* LOGOS */

.logo-box{
width:120px;
height:120px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
padding:10px;
box-shadow:
0 0 20px #38bdf8;
}

/* ICONOS FLOTANTES */

.float{
position:absolute;
font-size:50px;
opacity:.35;
animation:float 4s ease-in-out infinite;
}

.f1{
top:12%;
left:8%;
}

.f2{
top:15%;
right:8%;
}

.f3{
bottom:20%;
left:10%;
}

.f4{
bottom:22%;
right:10%;
}

@keyframes float{
50%{
transform:translateY(-15px);
}
}

/* PANEL PRINCIPAL */

.home-panel{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
text-align:center;
padding:20px;
}

.subtitle{
font-size:1.3rem;
opacity:.9;
}

/* ==========================================
   NUEVOS ESTILOS: RECUADROS ANIMALISTAS 
   ========================================== */
.level-box {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 20px;
    transition: all 0.3s ease;
}

.level-box:hover {
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.08);
    transform: translateY(-2px);
}

.btn-animal-click {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-radius: 16px;
    color: white;
    font-weight: bold;
    font-size: 1.25rem;
    transition: all 0.2s ease;
    cursor: pointer;
    border: none;
}

.btn-animal-click:hover {
    transform: scale(1.02);
    filter: brightness(1.1);
}

.box-easy { border-left: 6px solid #16a34a; }
.btn-easy-go { background: #16a34a; box-shadow: 0 4px 0 #15803d; }

.box-medium { border-left: 6px solid #3b82f6; }
.btn-medium-go { background: #3b82f6; box-shadow: 0 4px 0 #2563eb; }

.box-hard { border-left: 6px solid #dc2626; }
.btn-hard-go { background: #dc2626; box-shadow: 0 4px 0 #b91c1c; }
.xp-container{
width:260px;
height:20px;
background:rgba(255,255,255,.1);
border-radius:20px;
overflow:hidden;
border:2px solid rgba(255,255,255,.15);
}

.xp-bar{
height:100%;
background:
linear-gradient(
90deg,
#06b6d4,
#3b82f6
);
transition:width .4s;
}

</style>
</head>

                    <!-- NIVEL 3: DIFÍCIL -->
                    <div class="level-box box-hard flex flex-col gap-4 ${playerProgress.hard.unlocked ? '' : 'opacity-50 select-none'}">
                        <div class="flex justify-between items-center px-2">
                            <div>
                                <span class="text-xs font-bold uppercase tracking-wider text-red-400">Nivel Dificil</span>
                                <h2 class="text-xl font-bold text-white">Jugar Dificil 🦁</h2>
                            </div>
                            <span class="text-sm bg-black/40 px-3 py-1 rounded-full text-red-400 font-bold">
                                ${playerProgress.hard.unlocked ? (playerProgress.hard.completed ? '🏆 ¡SUPERADO!' : '⭐ Record: ' + playerProgress.hard.highscore) : '🔒 BLOQUEADO'}
                            </span>
                        </div>
                        ${playerProgress.hard.unlocked 
                            ? `<button onclick="renderGames('hard')" class="btn-animal-click btn-hard-go">
                                 <span>🎮 DESAFÍO FINAL</span>
                                 <span>➔</span>
                               </button>`
                            : `<button class="btn-animal-click bg-gray-700 cursor-not-allowed text-gray-400" disabled>
                                 <span>Necesitas pasar el Nivel Medio</span>
                                 <span>🔒</span>
                               </button>`
                        }

                    </div>

                </div>
            </div>
            `;
        }

        /* =========================================================
  VISTA: SELECCIÓN JUEGOS
========================================================= */
        function renderGames(level) {
            currentLevel = level;
            const games = gamesByLevel[level];

            document.getElementById("app").innerHTML = `
            <div class="min-h-screen p-6">
                <button onclick="renderLevels()" class="mb-6 text-white/70 hover:text-white transition-colors">
                    ← Volver a Niveles
                </button>
                <h1 class="text-3xl font-bold mb-8 text-center uppercase tracking-wider">Juegos Disponibles</h1>
                <div class="grid gap-4 max-w-lg mx-auto">
                    ${games.map(game => `
                        <button onclick="startGame('${game.id}')" class="card p-5 rounded-3xl text-left flex items-center" style="background:${config.secondary}">
                            <span class="text-3xl">${game.emoji}</span>
                            <span class="text-xl ml-4 font-medium">${game.name}</span>
                        </button>
                    `).join('')}
                </div>
            </div>
            `;
        }

        /* =========================================================
   FLUJO: INICIAR PARTIDA
========================================================= */
        function startGame(game) {
            currentGame = game;
            // CORREGIDO: Removido el 'let' para usar el estado global correctamente
            gameState.score = 0;
            gameState.round = 0;
            gameState.lives = 3;

            renderSimpleGame();
        }

        /* =========================================================
  VISTA: ESTRUCTURA JUEGO EN CURSO
========================================================= */
        function renderSimpleGame() {
            const data = gameContent[currentGame];

            if (gameState.round >= data.length) {
                finishGame();
                return;
            }

            const item = data[gameState.round];

            document.getElementById("app").innerHTML = `
            <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                <h1 class="text-3xl font-bold mb-4 uppercase tracking-wide">
                    🎮 ${currentGame.replaceAll('_', ' ')}
                </h1>
                <div class="flex gap-8 mb-6 text-xl bg-black/20 px-6 py-2 rounded-full border border-white/5">
                    <div class="text-yellow-400 font-bold">⭐ Puntos: ${gameState.score}</div>
                    <div class="text-red-400 font-bold">3 Vidas: ${'❤️'.repeat(gameState.lives)}</div>
                </div>
                <div class="w-full max-w-xl rounded-3xl p-8 shadow-2xl border border-white/10" style="background:${config.secondary}">
                    ${renderGameContent(item)}
                </div>
                <div class="mt-6 text-sm text-white/40">Pregunta ${gameState.round + 1} de ${data.length}</div>
            </div>
            `;
        }

        /* =========================================================
   RENDER DEL CONTENIDO DINÁMICO
========================================================= */
        function renderGameContent(item) {
            return `
            <div>
                <h2 class="text-2xl font-bold mb-6">${item.question}</h2>
                ${item.text ? `<div class="bg-black/30 p-4 rounded-2xl mb-6 text-xl font-mono">${item.text}</div>` : ''}
                <div id="options-container" class="flex flex-col gap-4 p-2 bg-black/10 rounded-2xl">
                    ${item.options.map(option => `
                        <button onclick="checkAnswer(this, '${option.replace(/'/g, "\\'")}', '${item.answer.replace(/'/g, "\\'")}')" 
                                class="btn bg-indigo-700 hover:bg-indigo-600 p-4 rounded-2xl text-lg w-full font-medium text-white text-left px-6 shadow-md">
                            ${option}
                        </button>
                    `).join('')}
                </div>
                <div id="feedback-box" class="mt-6 hidden p-4 rounded-2xl text-xl font-bold transition-all duration-300"></div>
            </div>
            `;
        }
        /* =========================================================
   PROCESAMIENTO DE RESPUESTAS
========================================================= */
        function checkAnswer(buttonElement, selected, correct) {
            const buttons = document.querySelectorAll("#options-container button");
            buttons.forEach(btn => btn.disabled = true);

            const feedbackBox = document.getElementById("feedback-box");
            feedbackBox.classList.remove("hidden");

            if (selected === correct) {
                buttonElement.style.backgroundColor = config.success;
                feedbackBox.style.backgroundColor = "rgba(22, 163, 74, 0.2)";
                feedbackBox.style.border = `2px solid ${config.success}`;
                feedbackBox.style.color = "#4ade80";
                feedbackBox.innerHTML = "✨ ¡Correcto! +10 puntos";
                gameState.score += 10;
                player.xp += 10;
                if(player.xp >= 100){
                    player.level++;
                    player.xp = 0;
                }
   
   

            } else {
                buttonElement.style.backgroundColor = config.danger;
                buttons.forEach(btn => {
                    if (btn.innerText.trim() === correct) {
                        btn.style.backgroundColor = config.success;
                    }
                });
                feedbackBox.style.backgroundColor = "rgba(220, 38, 38, 0.2)";
                feedbackBox.style.border = `2px solid ${config.danger}`;
                feedbackBox.style.color = "#f87171";
                feedbackBox.innerHTML = "❌ ¡Incorrecto! Perdiste una vida";
                gameState.lives--;
            }

            gameState.round++;

            setTimeout(() => {
                if (gameState.lives <= 0 || gameState.round >= gameContent[currentGame].length) {
                    finishGame();
                } else {
                    renderSimpleGame();
                }
            }, 1200);
        }
        /* =========================================================
   VISTA: PANTALLA FINAL (CORREGIDA Y ÚNICA)
========================================================= */
        function finishGame() {

    // Guardar récord
    if (gameState.score > playerProgress[currentLevel].highscore) {

        playerProgress[currentLevel].highscore =
        gameState.score;

    }

    // Desbloquear niveles
    if (currentLevel === "easy" && gameState.score >= 30) {

        playerProgress.easy.completed = true;
        playerProgress.medium.unlocked = true;

    }

    if (currentLevel === "medium" && gameState.score >= 30) {

        playerProgress.medium.completed = true;
        playerProgress.hard.unlocked = true;

    }

    if (currentLevel === "hard" && gameState.score >= 30) {

        playerProgress.hard.completed = true;

    }

    // Guardar progreso
    localStorage.setItem(
        "progress",
        JSON.stringify(playerProgress)
    );

    // Mensaje final
    let winMessage =
    gameState.lives > 0
    ? "🎉 ¡Nivel Superado!"
    : "💀 Fin del Juego";

    // Render final
    document.getElementById("app").innerHTML = `

    <div class="min-h-screen flex flex-col items-center justify-center text-center p-6">

        <h1 class="pixel glow text-3xl mb-6">
            ${winMessage}
        </h1>

        <div class="text-4xl font-bold mb-4">
            ⭐ ${gameState.score} puntos
        </div>

        <p class="text-lg mb-8 text-white/70 max-w-sm">

            ${
                gameState.lives > 0
                ? 'Tu progreso fue guardado exitosamente.'
                : 'Te quedaste sin vidas.'
            }

        </p>

        <div class="flex gap-4">

            <button
                onclick="startGame(currentGame)"
                class="btn bg-green-600 px-6 py-3 rounded-2xl font-bold"
            >
                🔄 Reintentar
            </button>

            <button
                onclick="renderLevels()"
                class="btn bg-indigo-700 px-6 py-3 rounded-2xl font-bold"
            >
                🗺️ Ver niveles
            </button>

        </div>

    </div>

    `;
}
        
        /* =========================================================
        
   ARRANQUE DE LA APLICACIÓN
========================================================= */
function showSplash(){

document.getElementById("app").innerHTML = `

<div class="min-h-screen flex flex-col items-center justify-center text-center">

<h1 class="pixel glow text-5xl mb-6">
AlfaLearn
</h1>

<p class="text-xl text-white/70">
Cargando experiencia...
</p>

</div>

`;

setTimeout(()=>{

renderHome();

},2000);

}
function resetProgress(){

localStorage.clear();

playerProgress = {

    easy:{
        unlocked:true,
        completed:false,
        highscore:0
    },

    medium:{
        unlocked:false,
        completed:false,
        highscore:0
    },

    hard:{
        unlocked:false,
        completed:false,
        highscore:0
    }

};

renderHome();

}
        showSplash();

    </script>

</body>
</html>
